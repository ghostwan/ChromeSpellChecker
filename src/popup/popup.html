<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ChromeSpellChecker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <img src="../../assets/icons/icon32.png" alt="" width="20" height="20">
    <span class="title">ChromeSpellChecker</span>
    <a href="#" id="btn-options" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </a>
  </header>

  <section class="section">
    <div class="field-row">
      <label for="sel-engine">Engine</label>
      <select id="sel-engine">
        <option value="languagetool">LanguageTool (free)</option>
        <option value="gemini">Gemini AI</option>
      </select>
    </div>
    <div class="field-row">
      <label for="sel-lang">Language</label>
      <select id="sel-lang">
        <option value="auto">Auto-detect 🌐</option>
        <option value="en-US">English (US) 🇺🇸</option>
        <option value="en-GB">English (UK) 🇬🇧</option>
        <option value="fr-FR">French 🇫🇷</option>
      </select>
    </div>
  </section>

  <section class="section divider">
    <div class="toggle-row">
      <span id="lbl-toggle">Enabled on this site</span>
      <label class="toggle">
        <input type="checkbox" id="chk-site" checked>
        <span class="slider"></span>
      </label>
    </div>
  </section>

  <section class="section divider">
    <button id="btn-check" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
      Check now
    </button>
  </section>

  <div id="no-key-notice" class="notice hidden">
    Gemini key not set — <a href="#" id="link-options">add it in Options</a>.
  </div>

  <footer id="ver"></footer>

  <script src="popup.js"></script>
</body>
</html>
